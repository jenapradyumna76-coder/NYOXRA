<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Licence Verification - NYAY Pravah</title>
    <link rel="stylesheet" href="../styles/login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main>
        <div class="tagsection">
            <div id="tag"><p>NYAY PRAVHA</p></div>
            <div id="tagline"><p>न्याय का प्रवाह</p></div>
        </div>

        <section class="auth-shell">
            <div class="auth-card popup-card">
                <h1 class="auth-title">Judge Licence Verification</h1>
                <p class="auth-subtitle">Upload front and back images for licence verification.</p>

                <form class="verification-upload-form" id="uploadForm">
                    <label class="auth-label" for="judge-front-proof">Upload Front Image</label>
                    <input class="auth-input file-input" id="judge-front-proof" type="file" accept="image/*" required>

                    <label class="auth-label" for="judge-back-proof">Upload Back Image</label>
                    <input class="auth-input file-input" id="judge-back-proof" type="file" accept="image/*" required>

                    <button class="auth-submit judge-theme upload-verification-btn" id="submitBtn" type="submit">
                        Submit Verification
                    </button>

                    <div class="flow-actions">
                        <button class="secondary-btn back-home-btn" id="btnHome" type="button">Back To Home</button>
                        <button class="secondary-btn back-previous-btn" id="btnPrev" type="button">Back To Previous</button>
                    </div>
                </form>
            </div>
        </section>
    </main>


</body>
</html>
